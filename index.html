<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Searl — Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:   #ff2d78;
      --cyan:   #40f2ff;
      --yellow: #ccff67;
      --purple: #b44fff;
      --green:  #7eff67;
      --bg:     #0a0010;
      --card:   #12001f;
      --border: 3px solid;
      --pixel:  'Press Start 2P', monospace;
      --vt:     'VT323', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── scanline overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.18) 2px,
        rgba(0,0,0,.18) 4px
      );
      pointer-events: none;
    }

    body {
      font-family: var(--pixel);
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px 60px;
      overflow-x: hidden;
    }

    /* ── animated mesh background ── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse 70% 50% at 20% 30%, rgba(180,79,255,.22) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 70%, rgba(0,240,255,.18) 0%, transparent 60%),
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,45,120,.16) 0%, transparent 60%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0%   { opacity: .7; }
      100% { opacity: 1; }
    }

    /* ── grid pixel dots ── */
    .grid-dots {
      position: fixed; inset: 0; z-index: -1;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.07) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* ── main container ── */
    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── top decoration bar ── */
    .deco-bar {
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, var(--pink), var(--purple), var(--cyan), var(--yellow), var(--green), var(--pink));
      background-size: 300% 100%;
      animation: gradMove 3s linear infinite;
      image-rendering: pixelated;
      margin-bottom: 32px;
    }
    @keyframes gradMove {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    /* ── avatar frame ── */
    .avatar-wrapper {
      position: relative;
      width: 100px; height: 100px;
      margin-bottom: 18px;
    }
    .avatar-border {
      position: absolute; inset: -5px;
      border: 3px solid var(--cyan);
      box-shadow:
        0 0 0 3px var(--pink),
        0 0 14px var(--cyan),
        0 0 28px var(--purple);
      animation: borderSpin 4s linear infinite;
    }
    @keyframes borderSpin {
      0%   { border-color: var(--cyan);   box-shadow: 0 0 0 3px var(--pink),   0 0 18px var(--cyan); }
      33%  { border-color: var(--yellow); box-shadow: 0 0 0 3px var(--purple), 0 0 18px var(--yellow); }
      66%  { border-color: var(--green);  box-shadow: 0 0 0 3px var(--cyan),   0 0 18px var(--green); }
      100% { border-color: var(--cyan);   box-shadow: 0 0 0 3px var(--pink),   0 0 18px var(--cyan); }
    }
    .avatar {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      image-rendering: pixelated;
    }

    /* ── name / bio ── */
    .name {
      font-family: var(--pixel);
      font-size: 20px;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--pink), var(--yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 100%;
      animation: textShift 4s ease-in-out infinite alternate;
      margin-bottom: 8px;
      text-align: center;
    }
    @keyframes textShift {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .bio {
      font-family: var(--vt);
      font-size: 20px;
      color: rgba(255,255,255,.65);
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 28px;
    }

    /* ── pixel star divider ── */
    .divider {
      font-family: var(--vt);
      font-size: 22px;
      color: var(--yellow);
      letter-spacing: 8px;
      margin-bottom: 24px;
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── link cards ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 18px;
      background: var(--card);
      border: var(--border) var(--cyan);
      text-decoration: none;
      color: #fff;
      font-family: var(--pixel);
      font-size: 9px;
      letter-spacing: 1px;
      cursor: pointer;
      position: relative;
      transition: transform .1s, box-shadow .1s;
      box-shadow: 4px 4px 0 var(--pink);
      image-rendering: pixelated;
    }

    /* pixel corner accents */
    .link-btn::before,
    .link-btn::after {
      content: '▪';
      position: absolute;
      font-size: 8px;
      color: var(--yellow);
    }
    .link-btn::before { top: 4px;  left: 4px; }
    .link-btn::after  { bottom: 4px; right: 4px; }

    .link-btn:hover {
      transform: translate(-3px, -3px);
      box-shadow: 7px 7px 0 var(--pink);
      border-color: var(--yellow);
      color: var(--yellow);
    }
    .link-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--pink);
    }

    /* color variants */
    .btn-discord  { border-color: var(--purple); box-shadow: 4px 4px 0 var(--purple); }
    .btn-discord:hover  { border-color: var(--cyan); box-shadow: 7px 7px 0 var(--purple); }

    .btn-gumroad  { border-color: var(--pink);   box-shadow: 4px 4px 0 var(--pink); }
    .btn-gumroad:hover  { border-color: var(--yellow); box-shadow: 7px 7px 0 var(--pink); }

    .btn-facebook { border-color: #4a90e2;       box-shadow: 4px 4px 0 #4a90e2; }
    .btn-facebook:hover { border-color: var(--cyan); box-shadow: 7px 7px 0 #4a90e2; }

    .btn-product  { border-color: var(--green);  box-shadow: 4px 4px 0 var(--green); }
    .btn-product:hover  { border-color: var(--yellow); box-shadow: 7px 7px 0 var(--green); }

    .btn-email    { border-color: var(--yellow); box-shadow: 4px 4px 0 var(--yellow); }
    .btn-email:hover    { border-color: var(--pink); box-shadow: 7px 7px 0 var(--yellow); }

    /* icon */
    .btn-icon {
      font-size: 20px;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px currentColor);
    }

    .btn-label { flex: 1; }
    .btn-arrow {
      font-size: 12px;
      color: rgba(255,255,255,.4);
      flex-shrink: 0;
    }

    /* ── footer ── */
    .footer {
      margin-top: 36px;
      font-family: var(--vt);
      font-size: 16px;
      color: rgba(255,255,255,.3);
      letter-spacing: 3px;
      text-align: center;
    }
    .footer span {
      color: var(--pink);
      animation: blink 1.6s step-end infinite;
    }

    /* ── floating pixels ── */
    .pixel-float {
      position: fixed;
      width: 6px; height: 6px;
      image-rendering: pixelated;
      animation: floatUp linear infinite;
      opacity: .7;
      pointer-events: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: .7; }
      100% { transform: translateY(-10vh)  rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="grid-dots"></div>

<!-- floating pixel squares -->
<script>
  const colors = ['#ff2d78','#00f0ff','#ffe600','#b44fff','#39ff14'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'pixel-float';
    el.style.cssText = `
      left: ${Math.random()*100}vw;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${Math.random()*6+4}px;
      height: ${Math.random()*6+4}px;
      animation-duration: ${Math.random()*12+8}s;
      animation-delay: ${Math.random()*10}s;
    `;
    document.body.appendChild(el);
  }
</script>

<div class="container">

  <div class="deco-bar"></div>

  <!-- Avatar -->
  <div class="avatar-wrapper">
    <div class="avatar-border"></div>
    <img class="avatar" src="searl-profile.png" style="object-fit:cover;" />
  </div>

  <!-- Name & Bio -->
  <div class="name">SEARL</div>
  <div class="bio">Welcome to my pixel world</div>

  <div class="divider">✦ ✦ ✦ ✦ ✦</div>

  <!-- Links -->
  <div class="links">

    <a class="link-btn btn-discord" href="https://YOUR_DISCORD_INVITE" target="_blank">
      <span class="btn-icon">🎮</span>
      <span class="btn-label">JOIN DISCORD</span>
      <span class="btn-arrow">▶</span>
    </a>

    <a class="link-btn btn-gumroad" href="https://YOUR_GUMROAD_URL" target="_blank">
      <span class="btn-icon">🛒</span>
      <span class="btn-label">GUMROAD SHOP</span>
      <span class="btn-arrow">▶</span>
    </a>

    <a class="link-btn btn-facebook" href="https://YOUR_FACEBOOK_URL" target="_blank">
      <span class="btn-icon">📘</span>
      <span class="btn-label">FACEBOOK PAGE</span>
      <span class="btn-arrow">▶</span>
    </a>

    <a class="link-btn btn-product" href="https://YOUR_PRODUCT_URL" target="_blank">
      <span class="btn-icon">✨</span>
      <span class="btn-label">FEATURED PRODUCT</span>
      <span class="btn-arrow">▶</span>
    </a>

    <a class="link-btn btn-email" href="mailto:YOUR_EMAIL@example.com">
      <span class="btn-icon">📧</span>
      <span class="btn-label">CONTACT / EMAIL</span>
      <span class="btn-arrow">▶</span>
    </a>

  </div>

  <div class="footer">
    <span>■</span> SEARL © 2026 <span>■</span>
  </div>

</div>
</body>
</html>
